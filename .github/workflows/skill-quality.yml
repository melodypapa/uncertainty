name: Skill Quality Check

on:
  push:
    branches: [main]
    paths:
      - 'skills/**/SKILL.md'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**/SKILL.md'
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  skills-check:
    name: Skills Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run skills-check
        uses: voodootikigod/skills-check@v1
        with:
          commands: 'check,audit,lint,budget'
          audit-fail-on: 'high'
          budget-max-tokens: 50000
          lint-fail-on: 'error'

      - name: Generate Report
        if: always()
        run: |
          echo "## Skills Quality Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All skills validated for freshness, security, quality, and efficiency." >> $GITHUB_STEP_SUMMARY

  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan for secrets
        run: |
          echo "Scanning for potential secrets in skill files..."
          find skills -name "SKILL.md" -exec grep -l -E '(API_KEY|SECRET|PASSWORD|TOKEN|PRIVATE_KEY)=[^[:space:]]' {} \; 2>/dev/null || echo "No hardcoded secrets found"

      - name: Scan for shell injection patterns
        run: |
          echo "Scanning for shell injection patterns..."
          find skills -name "SKILL.md" -exec grep -l -E '\$\([^)]*\)|`[^`]*\$\{' {} \; 2>/dev/null || echo "No shell injection patterns found"

      - name: Scan for unsafe exec patterns
        run: |
          echo "Scanning for unsafe exec patterns..."
          find skills -name "SKILL.md" -exec grep -l -E '(exec\(|eval\(|os\.system|subprocess\.(shell|call))' {} \; 2>/dev/null || echo "No unsafe exec patterns found"

  summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [skills-check, secrets-scan]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Skill Quality Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Skills Check | ${{ needs.skills-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets Scan | ${{ needs.secrets-scan.result }} |" >> $GITHUB_STEP_SUMMARY
